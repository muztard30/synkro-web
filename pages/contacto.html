<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synkro | Centro de Soporte NOC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">SYNKRO.</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Soporte</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5 mt-5">
    <div class="container" style="max-width: 600px;">
      <div class="chart-container">
        <h2 class="text-center mb-2" style="color: var(--primary-color);">Centro de Soporte NOC</h2>
        <p class="text-center text-muted small mb-4">Las solicitudes serán procesadas por nuestros ingenieros en un plazo máximo de 2 horas (SLA Nivel 1).</p>
        
        <form onsubmit="event.preventDefault(); alert('Ticket de asistencia generado con éxito. Su número de seguimiento ha sido enviado al correo registrado.');">
          <div class="mb-3">
            <label class="form-label text-white-50">ID de Cliente o Empresa</label>
            <input type="text" class="form-control bg-dark text-white border-secondary" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-white-50">Número de Serie del Nodo IoT / Equipo</label>
            <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Ej: MAC o IMEI del dispositivo" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-white-50">Severidad de la Incidencia</label>
            <select class="form-select bg-dark text-white border-secondary" required>
              <option value="">Seleccione un nivel...</option>
              <option value="baja">Crítica Baja (Consulta de software)</option>
              <option value="media">Crítica Media (Pérdida intermitente de datos)</option>
              <option value="alta">Crítica Alta (Caída total del nodo de control)</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label text-white-50">Descripción de la Anomalía Técnica</label>
            <textarea class="form-control bg-dark text-white border-secondary" rows="4" placeholder="Detalle los síntomas observados en la instrumentación..." required></textarea>
          </div>
          <button type="submit" class="btn btn-synkro w-100 py-2">Generar Ticket de Soporte</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
